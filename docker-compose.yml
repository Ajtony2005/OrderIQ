services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - orderiq_db:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/orderiq
      JWT_SECRET: change-me
    ports:
      - "3000:3000"

  web:
    build:
      context: ./frontend
    ports:
      - "5173:5173"

volumes:
  orderiq_db:
