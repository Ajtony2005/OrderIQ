name: Confluence Docs Sync

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - master
        paths:
            - docs/**
            - scripts/sync-confluence-docs.mjs
            - .github/workflows/confluence-docs-sync.yml

jobs:
    sync-docs:
        runs-on: ubuntu-latest
        env:
            CONFLUENCE_SYNC_ENABLED: "false"

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Sync docs to Confluence
              run: node ./scripts/sync-confluence-docs.mjs
              env:
                  CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
                  CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
                  CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
                  CONFLUENCE_SPACE_KEY: ${{ secrets.CONFLUENCE_SPACE_KEY }}
                  CONFLUENCE_PARENT_PAGE_ID: ${{ secrets.CONFLUENCE_PARENT_PAGE_ID }}
                  CONFLUENCE_SWAGGER_JSON_URL: ${{ secrets.CONFLUENCE_SWAGGER_JSON_URL }}
                  CONFLUENCE_SWAGGER_PAGE_TITLE: ${{ secrets.CONFLUENCE_SWAGGER_PAGE_TITLE }}
